name: Update Skills JSON

on:
  push:
    branches:
        - main
    paths:
      - '**/SKILL.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate JSON
        run: python scripts/generate_skills_json.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add skills.json
          if ! git diff --cached --exit-code; then
            git commit -m "docs: update skills.json [skip ci]"
            git push
          fi
