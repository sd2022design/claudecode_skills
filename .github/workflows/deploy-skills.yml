name: Deploy Skills Browser
on:
  push:
    branches: ["main"] # あなたのデフォルトブランチ名に合わせてください
  workflow_dispatch: # 手動実行も可能にする

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Skills JSON
        run: |
          # ディレクトリを走査してJSONを生成
          # 構造: [{"name": "ディレクトリ名", "path": "ディレクトリ名"}]
          echo "[" > skills.json
          FIRST=true
          for d in */; do
            if [ -f "${d}SKILL.md" ]; then
              if [ "$FIRST" = false ]; then echo "," >> skills.json; fi
              DIR_NAME=$(basename "$d")
              echo "{\"name\": \"$DIR_NAME\", \"path\": \"$DIR_NAME\"}" >> skills.json
              FIRST=false
            fi
          done
          echo "]" >> skills.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # index.htmlと生成されたskills.jsonをアップロード

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
