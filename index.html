<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Claude Skills Catalog</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" class="max-w-5xl mx-auto py-12 px-4">
        <header class="mb-12 border-b pb-8">
            <h1 class="text-4xl font-bold text-slate-800">🛠 Team Skills Catalog</h1>
            <p class="mt-4 text-slate-600">Claude Code で利用可能な共有スキルの一覧です。</p>
        </header>

        <div v-if="loading" class="text-center py-20">Loading...</div>
        
        <div v-else class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div v-for="skill in skills" :key="skill.name" 
                 class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition-shadow">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-mono bg-blue-100 text-blue-700 px-2 py-1 rounded">/{{ skill.name }}</span>
                </div>
                <h2 class="text-xl font-bold mb-2">{{ skill.name }}</h2>
                <p class="text-slate-600 text-sm mb-4">{{ skill.description }}</p>
                <div class="text-xs text-slate-400 font-mono">Path: {{ skill.path }}</div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue
        createApp({
            setup() {
                const skills = ref([])
                const loading = ref(true)

                onMounted(async () => {
                    try {
                        const response = await fetch('./skills.json')
                        skills.value = await response.json()
                    } catch (e) {
                        console.error("Failed to load skills.json", e)
                    } finally {
                        loading.value = false
                    }
                })

                return { skills, loading }
            }
        }).mount('#app')
    </script>
</body>
</html>
