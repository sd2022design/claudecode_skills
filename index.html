<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Catalog</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" class="max-w-4xl mx-auto py-12 px-4">
        <header class="mb-12 border-b pb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-800">🛠 Skills Catalog</h1>
            <p class="mt-4 text-slate-600 font-medium">共有された Claude Code Skills の一覧です</p>
        </header>

        <div v-if="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-slate-500 font-mono">Loading skills...</p>
        </div>
        
        <div v-else class="space-y-4">
            <div v-for="(skill, index) in skills" :key="skill.name" 
                 class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all">
                
                <div @click="toggleSkill(index)" 
                     class="p-5 cursor-pointer hover:bg-slate-50 flex items-center justify-between transition-colors">
                    <div class="flex-1">
                        <div class="flex items-center space-x-3 mb-1">
                            <span class="text-xs font-mono bg-blue-100 text-blue-700 px-2 py-0.5 rounded">/{{ skill.name }}</span>
                            <h2 class="text-lg font-bold text-slate-800">{{ skill.name }}</h2>
                        </div>
                        <p class="text-slate-500 text-sm leading-relaxed">{{ skill.description }}</p>
                    </div>
                    <div class="ml-4 text-slate-400">
                        <i class="fas" :class="openIndexes.includes(index) ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                    </div>
                </div>

                <transition name="expand">
                    <div v-if="openIndexes.includes(index)" class="border-t border-slate-100 bg-slate-50">
                        <div class="p-5">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Prompt & Command</h3>
                                <div class="flex space-x-4">
                                    <button @click.stop="copyText('/' + skill.name)" class="text-xs text-green-600 hover:text-green-800 font-bold">
                                        <i class="fas fa-terminal mr-1"></i> Copy Command
                                    </button>
                                    <button @click.stop="copyText(skill.content)" class="text-xs text-blue-600 hover:text-blue-800 font-bold">
                                        <i class="far fa-copy mr-1"></i> Copy Prompt
                                    </button>
                                </div>
                            </div>
                            <pre class="text-sm text-slate-700 font-mono whitespace-pre-wrap bg-white p-4 rounded-lg border border-slate-200 leading-relaxed">{{ skill.content }}</pre>
                            <div class="mt-4 text-[10px] text-slate-400 font-mono">
                                <i class="far fa-folder-open mr-1"></i> Location: {{ skill.path }}
                            </div>
                        </div>
                    </div>
                </transition>
            </div>
        </div>

        <transition name="fade">
            <div v-if="toastVisible" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-3 z-50">
                <i class="fas fa-check-circle text-green-400"></i>
                <span>コピーしました！</span>
            </div>
        </transition>
    </div>

    <style>
        .expand-enter-active, .expand-leave-active {
            transition: all 0.3s ease-in-out;
            max-height: 2000px;
        }
        .expand-enter-from, .expand-leave-to {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>

    <script>
        const { createApp, ref, onMounted } = Vue
        createApp({
            setup() {
                const skills = ref([])
                const loading = ref(true)
                const openIndexes = ref([])
                const toastVisible = ref(false)

                const toggleSkill = (index) => {
                    const pos = openIndexes.value.indexOf(index)
                    if (pos === -1) {
                        openIndexes.value.push(index)
                    } else {
                        openIndexes.value.splice(pos, 1)
                    }
                }

                const copyText = (text) => {
                    navigator.clipboard.writeText(text).then(() => {
                        toastVisible.value = true
                        setTimeout(() => { toastVisible.value = false }, 2000)
                    })
                }

                onMounted(async () => {
                    try {
                        const response = await fetch(`./skills.json?t=${new Date().getTime()}`, {
                            cache: 'no-store'
                        })
                        skills.value = await response.json()
                    } catch (e) {
                        console.error("Failed to load skills.json", e)
                    } finally {
                        loading.value = false
                    }
                })

                return { skills, loading, openIndexes, toggleSkill, copyText, toastVisible }
            }
        }).mount('#app')
    </script>
</body>
</html>
